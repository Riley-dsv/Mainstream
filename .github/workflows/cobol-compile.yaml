name: COBOL Compile Check

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GnuCOBOL
        uses: fabasoad/setup-cobol-action@v1
        with:
          version: "3.2"

      - name: Verify compiler
        run: cobc -V

      - name: Compile all COBOL sources
        run: |
          set -e
          mkdir -p build

          cobc -x -I ./src/copybooks src/transaction-reader.cob -o _build/batch-transaction-reader
          cobc -x -I ./src/copybooks src/transaction-formatter.cob -o _build/report-trans-generator
          cobc -m -I ./src/copybooks src/main.cob -o _build/legacy-batch-service

